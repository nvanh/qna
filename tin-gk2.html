<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ôn tập Tin Lớp 6 - GHK2</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="style.css" rel="stylesheet" />
	</head>
	<body>
		<!-- Result Modal -->
		<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header bg-primary text-white">
						<h5 class="modal-title" id="resultTitle"></h5>
					</div>
					<div class="modal-body text-center">
						<p id="resultMessage" class="fs-4"></p>
						<div class="d-flex justify-content-center align-items-center gap-3">
							<p>Correct: <span id="resultCorrect" class="stats-correct fw-bold fs-3"></span></p>
							<p>Incorrect: <span id="resultIncorrect" class="stats-incorrect fw-bold fs-3"></span></p>
							<p>Time: <span id="resultTime" class="fw-bold fs-3"></span></p>
						</div>
						<button class="btn btn-lg btn-primary mt-3" onclick="restartQuiz()">Retest</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Main Content -->
		<div class="w-100">
			<div class="header d-flex justify-content-between align-items-center bg-dark text-white w-100">
				<a href="index.html" class="text-decoration-none text-white me-5"><span class="material-symbols-outlined">arrow_back</span></a>
				<div class="d-flex flex-column gap-2">
					<h1 class="text-center m-0 d-none d-sm-block">Ôn tập Tin Học Lớp 6 - GHK2</h1>
					<div id="timer" class="fs-5 text-center text-warning">Time: 0s</div>
				</div>
				<div id="stats" class="text-end">
					<div>Correct: <span class="stats-correct">0</span></div>
					<div>Incorrect: <span class="stats-incorrect">0</span></div>
				</div>
			</div>
			<div class="play mx-auto">
				<div id="question" class="question-display"></div>
				<div id="options" class="d-flex flex-wrap justify-content-center"></div>
				<div class="text-center">
					<button id="confirmBtn" class="btn btn-success confirm-btn" disabled>Confirm (Phím Space)</button>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script>
			const correctSound = new Audio("correct.mp3");
			const errorSound = new Audio("error.mp3");

			const questions = [

				{

					correct: "C. Sử dụng kết hợp chữ hoa, chữ thường, số và ký tự đặc biệt.",
				},
				{
					question: "Câu 6. Hành vi nào sau đây có thể gây mất an toàn thông tin cá nhân?",
					options: ["A. Kích hoạt xác thực hai bước trên tài khoản quan trọng.", "B. Đăng nhập tài khoản cá nhân trên máy tính lạ và không đăng xuất.", "C. Đổi mật khẩu thường xuyên.", "D. Không chia sẻ thông tin quan trọng trên mạng."],
					correct: "B. Đăng nhập tài khoản cá nhân trên máy tính lạ và không đăng xuất.",
				},
				{
					question: "Câu 7. Khi bị quấy rối trên Internet, bạn nên làm gì?",
					options: ["A. Đáp trả và tranh luận với kẻ quấy rối.", "B. Báo cáo sự việc cho người lớn hoặc nhà cung cấp dịch vụ mạng.", "C. Công khai mọi chuyện trên mạng xã hội.", "D. Im lặng và không làm gì."],
					correct: "B. Báo cáo sự việc cho người lớn hoặc nhà cung cấp dịch vụ mạng.",
				},
				{
					question: "Câu 8. Khi phát hiện có phần mềm độc hại trên máy tính, bạn nên làm gì?",
					options: ["A. Tiếp tục sử dụng như bình thường.", "B. Cài đặt phần mềm diệt virus và quét toàn bộ hệ thống.", "C. Chia sẻ tập tin bị nhiễm virus cho bạn bè để kiểm tra.", "D. Gỡ bỏ toàn bộ phần mềm trên máy tính."],
					correct: "B. Cài đặt phần mềm diệt virus và quét toàn bộ hệ thống.",
				},
				{
					question: "Câu 9. Một đặc điểm của phần mềm độc hại (malware) là gì?",
					options: ["A. Luôn hiển thị thông báo cho người dùng trước khi hoạt động.", "B. Không ảnh hưởng đến hiệu suất của máy tính.", "C. Có thể xâm nhập vào máy tính mà không cần sự cho phép của người dùng.", "D. Giúp bảo vệ thông tin cá nhân."],
					correct: "C. Có thể xâm nhập vào máy tính mà không cần sự cho phép của người dùng.",
				},
				{
					question: "Câu 10. Phishing là hình thức tấn công mạng như thế nào?",
					options: ["A. Đánh cắp thông tin bằng cách giả mạo trang web hoặc email đáng tin cậy.", "B. Tạo virus để làm hỏng phần cứng máy tính.", "C. Chặn kết nối Internet của người dùng.", "D. Là phần mềm giúp bảo vệ dữ liệu cá nhân."],
					correct: "A. Đánh cắp thông tin bằng cách giả mạo trang web hoặc email đáng tin cậy.",
				},
				{
					question: "Câu 11. Khi thấy một lời mời kết bạn từ người lạ trên mạng xã hội, bạn nên làm gì với lời kết bạn đó?",
					options: ["A. Chấp nhận ngay để kết thêm bạn mới.", "B. Kiểm tra thông tin cá nhân của họ trước khi đồng ý.", "C. Gửi thông tin cá nhân của mình để làm quen.", "D. Hỏi xin mật khẩu tài khoản của họ để kiểm tra danh tính."],
					correct: "B. Kiểm tra thông tin cá nhân của họ trước khi đồng ý.",
				},
				{
					question: "Câu 12. Đâu là dấu hiệu của một email lừa đảo (phishing email)?",
					options: ["A. Email gửi từ địa chỉ không rõ ràng, chứa nhiều lỗi chính tả.", "B. Email từ bạn bè và người thân có nội dung bình thường.", "C. Email từ công ty bạn đang làm việc, có thông tin xác thực.", "D. Email chứa các hình ảnh chất lượng cao và nội dung rõ ràng."],
					correct: "A. Email gửi từ địa chỉ không rõ ràng, chứa nhiều lỗi chính tả.",
				},
				{
					question: "Câu 13. Khi sử dụng mật khẩu, điều nào sau đây là KHÔNG nên làm?",
					options: ["A. Đặt mật khẩu khác nhau cho từng tài khoản quan trọng.", "B. Sử dụng mật khẩu chứa ký tự đặc biệt, chữ số và chữ cái hoa/thường.", "C. Ghi mật khẩu ra giấy và dán lên màn hình máy tính.", "D. Bật xác thực hai bước cho tài khoản quan trọng."],
					correct: "C. Ghi mật khẩu ra giấy và dán lên màn hình máy tính.",
				},
				{
					question: "Câu 14. Khi nhận được tin nhắn lạ yêu cầu cung cấp thông tin cá nhân, bạn nên:",
					options: ["A. Ngay lập tức cung cấp thông tin.", "B. Kiểm tra nguồn gửi, nếu thấy đáng tin cậy thì cung cấp.", "C. Không cung cấp và báo cáo tin nhắn đó.", "D. Chia sẻ tin nhắn đó cho bạn bè để họ cùng tham khảo."],
					correct: "C. Không cung cấp và báo cáo tin nhắn đó.",
				},
				{
					question: "Câu 15. Một trong những biện pháp giúp bảo vệ thiết bị máy tính khỏi phần mềm độc hại là gì?",
					options: ["A. Không bao giờ cập nhật phần mềm hệ điều hành.", "B. Chỉ sử dụng Wi-Fi công cộng để tiết kiệm dữ liệu di động.", "C. Chỉ tải phần mềm từ nguồn đáng tin cậy.", "D. Tắt phần mềm diệt virus để tăng tốc độ máy tính."],
					correct: "C. Chỉ tải phần mềm từ nguồn đáng tin cậy.",
				},
				{
					question: "Câu 16. Đâu KHÔNG phải là lợi ích của sơ đồ tư duy?",
					options: ["A. Giúp tổ chức thông tin một cách khoa học.", "B. Giúp ghi nhớ và hiểu bài nhanh hơn.", "C. Giúp sao chép thông tin nguyên văn từ sách giáo khoa.", "D. Tăng khả năng sáng tạo và tư duy logic."],
					correct: "C. Giúp sao chép thông tin nguyên văn từ sách giáo khoa.",
				},
				{
					question: "Câu 17. Thành phần chính của một sơ đồ tư duy gồm có:",
					options: ["A. Chủ đề chính, nhánh, từ khóa, hình ảnh.", "B. Chủ đề chính, đoạn văn dài, biểu đồ cột.", "C. Chỉ có hình ảnh và màu sắc.", "D. Chủ đề chính và một bài viết dài mô tả nội dung."],
					correct: "A. Chủ đề chính, nhánh, từ khóa, hình ảnh.",
				},
				{
					question: "Câu 18. Trong sơ đồ tư duy, tại sao nên sử dụng từ khóa thay vì câu dài?",
					options: ["A. Vì từ khóa giúp tiết kiệm giấy.", "B. Vì từ khóa giúp tóm tắt ý chính và dễ nhớ hơn.", "C. Vì câu dài dễ bị hiểu sai.", "D. Vì sơ đồ tư duy không thể chứa nhiều chữ."],
					correct: "B. Vì từ khóa giúp tóm tắt ý chính và dễ nhớ hơn.",
				},
				{
					question: "Câu 19. Một sơ đồ tư duy hiệu quả cần có đặc điểm nào?",
					options: ["A. Sử dụng màu sắc và hình ảnh để tăng tính sinh động.", "B. Chỉ sử dụng một màu duy nhất.", "C. Chỉ nên vẽ bằng tay, không nên dùng phần mềm.", "D. Không cần bố cục rõ ràng."],
					correct: "A. Sử dụng màu sắc và hình ảnh để tăng tính sinh động.",
				},
				{
					question: "Câu 20. Khi nào nên sử dụng sơ đồ tư duy?",
					options: ["A. Khi cần ghi nhớ thông tin nhanh chóng.", "B. Khi viết bài luận dài.", "C. Khi lập danh sách mua sắm.", "D. Khi cần sao chép toàn bộ nội dung sách giáo khoa."],
					correct: "A. Khi cần ghi nhớ thông tin nhanh chóng.",
				},
				{
					question: "Câu 21. Phần mềm nào sau đây có thể hỗ trợ vẽ sơ đồ tư duy trên máy tính?",
					options: ["A. Microsoft Excel.", "B. MindMeister.", "C. Windows Media Player.", "D. Paint."],
					correct: "B. MindMeister.",
				},
				{
					question: "Câu 22. Khi thiết kế sơ đồ tư duy, điều nào giúp tăng hiệu quả học tập?",
					options: ["A. Chỉ sử dụng một kiểu chữ duy nhất.", "B. Kết hợp nhiều màu sắc và biểu tượng trực quan.", "C. Ghi toàn bộ nội dung bài học vào sơ đồ tư duy.", "D. Không cần phân cấp thông tin."],
					correct: "B. Kết hợp nhiều màu sắc và biểu tượng trực quan.",
				},
				{
					question: "Câu 23. Nhánh chính của sơ đồ tư duy thường được đặt ở đâu?",
					options: ["A. Ở bên phải sơ đồ.", "B. Ở trung tâm sơ đồ.", "C. Ở góc trên bên trái.", "D. Ở bất kỳ đâu, không theo quy tắc."],
					correct: "B. Ở trung tâm sơ đồ.",
				},
				{
					question: "Câu 24. Điều nào KHÔNG phải là lợi ích của sơ đồ tư duy?",
					options: ["A. Giúp tóm tắt thông tin nhanh chóng.", "B. Giúp ghi nhớ thông tin lâu hơn.", "C. Bắt buộc phải viết đầy đủ câu văn.", "D. Giúp tăng cường sự sáng tạo."],
					correct: "C. Bắt buộc phải viết đầy đủ câu văn.",
				},
			];

			let currentQuestionIndex = 0;
			let correctCount = 0;
			let incorrectCount = 0;
			let selectedOption = null;
			let timerInterval = null;
			let secondsElapsed = 0;
			let shuffledQuestions = [];

			const resultModal = new bootstrap.Modal(document.getElementById("resultModal"));

			function shuffleArray(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			function startQuiz() {
				currentQuestionIndex = 0;
				correctCount = 0;
				incorrectCount = 0;
				shuffledQuestions = shuffleArray([...questions]);
				secondsElapsed = 0;

				updateStats();
				loadQuestion();
				startTimer();
			}

			function startTimer() {
				if (timerInterval) clearInterval(timerInterval);
				secondsElapsed = 0;
				document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				timerInterval = setInterval(() => {
					secondsElapsed++;
					document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				}, 1000);
			}

			function updateStats() {
				document.querySelector("#stats .stats-correct").textContent = correctCount;
				document.querySelector("#stats .stats-incorrect").textContent = incorrectCount;
			}

			function loadQuestion() {
				if (currentQuestionIndex >= shuffledQuestions.length) {
					showResult();
					return;
				}

				const q = shuffledQuestions[currentQuestionIndex];
				const questionElement = document.getElementById("question");
				let formattedQuestion = q.question.replace(/\*([^*]+)\*/g, '<span class="text-primary fw-bold">$1</span>');
				questionElement.innerHTML = formattedQuestion;

				const playArea = document.querySelector(".play");
				let imageContainer = playArea.querySelector("#questionImageContainer");

				if (q.image) {
					if (!imageContainer) {
						imageContainer = document.createElement("div");
						imageContainer.id = "questionImageContainer";
						imageContainer.className = "text-center mb-4";
						const img = document.createElement("img");
						img.id = "questionImage";
						img.className = "img-fluid";
						img.style.maxHeight = "400px";
						img.alt = "Hình minh họa câu hỏi";
						imageContainer.appendChild(img);
						// Chèn ngay sau phần câu hỏi
						document.getElementById("question").after(imageContainer);
					}
					document.getElementById("questionImage").src = q.image;
					imageContainer.style.display = "block";
				} else {
					if (imageContainer) {
						imageContainer.style.display = "none";
					}
				}

				const optionsContainer = document.getElementById("options");
				const confirmBtn = document.getElementById("confirmBtn");
				confirmBtn.disabled = true;
				selectedOption = null;

				const shuffledOptions = shuffleArray([...q.options]);

				optionsContainer.innerHTML = "";

				shuffledOptions.forEach((option) => {
					const div = document.createElement("div");
					div.className = "option-pill";
					div.textContent = option;
					div.onclick = () => selectOption(div, option);
					optionsContainer.appendChild(div);
				});
			}

			function selectOption(element, option) {
				document.querySelectorAll(".option-pill").forEach((pill) => pill.classList.remove("selected"));
				element.classList.add("selected");
				selectedOption = option;
				document.getElementById("confirmBtn").disabled = false;
			}

			function checkAnswer() {
				const q = shuffledQuestions[currentQuestionIndex];
				const isCorrect = selectedOption === q.correct;
				const selectedPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === selectedOption);

				if (isCorrect) {
					correctCount++;
					selectedPill.classList.add("correct");
					correctSound.play().catch((e) => console.log("Không phát được âm thanh Correct:", e));
				} else {
					incorrectCount++;
					selectedPill.classList.add("incorrect");
					const correctPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === q.correct);
					if (correctPill) correctPill.classList.add("correct");
					errorSound.play().catch((e) => console.log("Không phát được âm thanh Incorrect:", e));
				}
				updateStats();

				setTimeout(() => {
					currentQuestionIndex++;
					loadQuestion();
				}, 1000);
			}

			function showResult() {
				clearInterval(timerInterval);
				document.getElementById("resultCorrect").textContent = correctCount;
				document.getElementById("resultIncorrect").textContent = incorrectCount;
				document.getElementById("resultTime").textContent = `${secondsElapsed}s`;

				if (correctCount === shuffledQuestions.length) {
					document.getElementById("resultTitle").textContent = "Excellent!";
					document.getElementById("resultMessage").textContent = "You achieved 100% accuracy.";
				} else {
					document.getElementById("resultTitle").textContent = "Finished!";
					document.getElementById("resultMessage").textContent = `You answered ${correctCount} out of ${shuffledQuestions.length} questions correctly. Give it another shot!`;
				}
				resultModal.show();
			}

			function restartQuiz() {
				resultModal.hide();
				startQuiz();
			}

			document.getElementById("confirmBtn").onclick = checkAnswer;
			document.addEventListener("keydown", (e) => {
				if (e.code === "Space" && !document.getElementById("confirmBtn").disabled) {
					e.preventDefault();
					checkAnswer();
				}
			});

			document.addEventListener("DOMContentLoaded", () => {
				startQuiz();
			});
		</script>
	</body>
</html>
