<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ôn tập CN Lớp 6 - GHK2</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="style.css" rel="stylesheet" />
	</head>
	<body>
		<!-- Result Modal -->
		<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header bg-primary text-white">
						<h5 class="modal-title" id="resultTitle"></h5>
					</div>
					<div class="modal-body text-center">
						<p id="resultMessage" class="fs-4"></p>
						<div class="d-flex justify-content-center align-items-center gap-3">
							<p>Correct: <span id="resultCorrect" class="stats-correct fw-bold fs-3"></span></p>
							<p>Incorrect: <span id="resultIncorrect" class="stats-incorrect fw-bold fs-3"></span></p>
							<p>Time: <span id="resultTime" class="fw-bold fs-3"></span></p>
						</div>
						<button class="btn btn-lg btn-primary mt-3" onclick="restartQuiz()">Retest</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Main Content -->
		<div class="w-100">
			<div class="header d-flex justify-content-between align-items-center bg-dark text-white w-100">
				<a href="index.html" class="text-decoration-none text-white me-5"><span class="material-symbols-outlined">arrow_back</span></a>
				<div class="d-flex flex-column gap-2">
					<h1 class="text-center m-0 d-none d-sm-block">Ôn tập Công Nghệ Lớp 6 - GHK2</h1>
					<div id="timer" class="fs-5 text-center text-warning">Time: 0s</div>
				</div>
				<div id="stats" class="text-end">
					<div>Correct: <span class="stats-correct">0</span></div>
					<div>Incorrect: <span class="stats-incorrect">0</span></div>
				</div>
			</div>
			<div class="play mx-auto">
				<div id="question" class="question-display"></div>
				<div id="options" class="d-flex flex-column flex-wrap justify-content-center"></div>
				<div class="text-center">
					<button id="confirmBtn" class="btn btn-success confirm-btn" disabled>Confirm (Phím Space)</button>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script>
			const correctSound = new Audio("correct.mp3");
			const errorSound = new Audio("error.mp3");

			[
				{
					question: "Câu 1. Nhược điểm của phương pháp phơi khô quần áo là gì?",
					options: ["A. Phụ thuộc vào thời tiết.", "B. Tốn nhiều chi phí.", "C. Được sử dụng rộng rãi trong sinh hoạt.", "D. Tiết kiệm điện năng."],
					correct: "A. Phụ thuộc vào thời tiết.",
				},
				{
					question: "Câu 2. “Cách ăn mặc theo nhu cầu thẩm mỹ và sở thích tạo nên vẻ đẹp riêng độc đáo của mỗi người” nói về gì?",
					options: ["A. Màu sắc thời trang.", "B. Tin tức thời trang.", "C. Phong cách thời trang.", "D. Phụ kiện thời trang."],
					correct: "C. Phong cách thời trang.",
				},
				{
					question: "Câu 3. Khi đi học thể dục em sẽ lựa chọn trang phục như thế nào?",
					options: ["A. Vải sợi bông, may rộng, giày ba ta.", "B. Vải sợi bông, may sát người, giày cao gót.", "C. Vải sợi tổng hợp, may rộng, giày da đắt tiền.", "D. Vải sợi bông, may rộng, dép lê."],
					correct: "A. Vải sợi bông, may rộng, giày ba ta.",
				},
				{
					question: "Câu 4. Đặc điểm nào sau đây thuộc phong cách thời trang cổ điển?",
					options: ["A. Thiết kế đơn giản, đường nét tạo cảm giác mạnh mẽ và khỏe khoắn.", "B. Mang đậm nét văn hóa của mỗi dân tộc.", "C. Thể hiện sự nhẹ nhàng, mềm mại thông qua các đường cong, đường uốn lượn.", "D. Hình thức đơn giản, nghiêm túc, lịch sự."],
					correct: "C. Thể hiện sự nhẹ nhàng, mềm mại thông qua các đường cong, đường uốn lượn.",
				},
				{
					question: "Câu 5. Bảo quản trang phục gồm những công việc nào sau đây?",
					options: ["A. Làm khô, làm phẳng, cất giữ.", "B. Làm sạch, làm khô, cất giữ.", "C. Làm sạch, làm khô, làm phẳng, cất giữ.", "D. Làm sạch, làm khô, làm phẳng."],
					correct: "C. Làm sạch, làm khô, làm phẳng, cất giữ.",
				},
				{
					question: "Câu 6. Màu vải nào dưới đây có thể phối hợp với tất cả các màu sắc khác khi phối đồ?",
					options: ["A. Màu vàng, màu trắng.", "B. Màu xanh, màu đỏ.", "C. Màu đen, màu vàng.", "D. Màu đen, màu trắng."],
					correct: "B. Màu xanh, màu đỏ.",
				},
				{
					question: "Câu 7. Vải hoa nên kết hợp với loại vải nào sau đây?",
					options: ["A. Vải trơn.", "B. Vải kẻ caro.", "C. Vải kẻ dọc.", "D. Vải kẻ ngang."],
					correct: "B. Vải kẻ caro.",
				},
				{
					question: "Câu 8. Trang phục ở nhà có đặc điểm nào sau đây?",
					options: ["A. Kiểu dáng đẹp, trang trọng.", "B. Kiểu dáng lịch sự, gọn gàng.", "C. Kiểu dáng đơn giản, thoải mái.", "D. Kiểu dáng ôm sát cơ thể."],
					correct: "C. Kiểu dáng đơn giản, thoải mái.",
				},
				{
					question: "Câu 9. Kí hiệu của đơn vị công suất định mức là gì?",
					options: ["A. P", "B. V", "C. W", "D. kV"],
					correct: "C. W",
				},
				{
					question: "Câu 10. Phong cách nào dưới đây phù hợp với nhiều người, thường được sử dụng khi đi học, đi làm, tham gia các sự kiện có tính chất trang trọng?",
					options: ["A. Phong cách thể thao.", "B. Phong cách lãng mạn.", "C. Phong cách cổ điển.", "D. Phong cách dân gian."],
					correct: "B. Phong cách lãng mạn.",
				},
				{
					question: "Câu 11. Sải cánh là thông số kĩ thuật của gì?",
					options: ["A. Máy sấy tóc.", "B. Quạt điện.", "C. Đèn điện.", "D. Máy hút bụi."],
					correct: "A. Máy sấy tóc.",
				},
				{
					question: "Câu 12. Đồ dùng loại điện – quang biến điện năng thành loại năng lượng gì?",
					options: ["A. Điện năng.", "B. Quang năng.", "C. Nhiệt năng.", "D. Cơ năng."],
					correct: "B. Quang năng.",
				},
				{
					question: "Câu 13. Trên một đồ dùng điện có ghi 220V – 100W, thông số kĩ thuật này cho biết điều gì?",
					options: ["A. Điện áp định mức 220V; công suất định mức 100W.", "B. Công suất định mức 220V; điện áp định mức 100W.", "C. Công suất định mức 100W, dung tích 220V.", "D. Điện áp định mức 100W, dung tích 220V."],
					correct: "C. Công suất định mức 100W, dung tích 220V.",
				},
				{
					question: "Câu 14. Đồ dùng nào sau đây không phải là đồ dùng điện trong gia đình?",
					options: ["A. Bếp từ.", "B. Máy sấy.", "C. Nồi cơm điện.", "D. Đèn dầu."],
					correct: "D. Đèn dầu.",
				},
				{
					question: "Câu 15. Ý nghĩa của việc bảo quản trang phục đúng cách là gì?",
					options: ["A. Để trang phục luôn sạch sẽ, bền đẹp và tiết kiệm chi phí mua sắm.", "B. Để trang phục trông cũ hơn và hợp thời trang hơn.", "C. Chỉ để làm đẹp cho không gian tủ quần áo.", "D. Không có tác dụng gì cụ thể, chỉ là thói quen."],
					correct: "C. Chỉ để làm đẹp cho không gian tủ quần áo.",
				},
				{
					question: "Câu 16. Khi đi dã ngoại vào mùa hè, loại trang phục nào là lựa chọn tối ưu nhất?",
					options: ["A. Quần áo dày, làm bằng vải len để giữ ấm.", "B. Trang phục bó sát, làm bằng vải nilon không thấm mồ hôi.", "C. Trang phục rộng rãi, thoải mái, làm bằng vải cotton thấm hút mồ hôi tốt.", "D. Trang phục dạ hội cầu kỳ để chụp ảnh đẹp."],
					correct: "B. Trang phục bó sát, làm bằng vải nilon không thấm mồ hôi.",
				},
				{
					question: "Câu 17. Để giúp bạn An (có vóc dáng thấp, béo) trông thon gọn và cao hơn, bạn nên tư vấn chọn trang phục như thế nào?",
					options: ["A. Chọn vải có kẻ sọc ngang, hoa văn to, màu sắc rực rỡ.", "B. Chọn vải có kẻ sọc dọc, màu tối, kiểu dáng đơn giản.", "C. Chọn trang phục quá rộng (oversize) để che hết dáng người.", "D. Chọn vải bóng, màu trắng và có xếp nếp rườm rà."],
					correct: "B. Chọn vải có kẻ sọc dọc, màu tối, kiểu dáng đơn giản.",
				},
				{
					question: "Câu 18. Hai đại lượng định mức chung thường được ghi trên các đồ dùng điện gia đình là gì?",
					options: ["A. Chiều dài và chiều rộng.", "B. Khối lượng và thể tích.", "C. Điện áp định mức và công suất định mức.", "D. Cường độ âm thanh và nhiệt độ môi trường."],
					correct: "D. Cường độ âm thanh và nhiệt độ môi trường.",
				},
				{
					question: "Câu 19. Đồ dùng điện nào sau đây có công dụng biến đổi điện năng thành nhiệt năng?",
					options: ["A. Quạt điện.", "B. Bàn là (ủi) điện.", "C. Máy hút bụi.", "D. Tủ lạnh."],
					correct: "A. Quạt điện.",
				},
				{
					question: "Câu 20. Trên một bóng đèn LED có ghi 220V – 9W. Con số 9W cho biết điều gì?",
					options: ["A. Mức độ sáng của bóng đèn.", "B. Điện áp định mức để đèn hoạt động bình thường.", "C. Công suất định mức, cho biết mức độ tiêu thụ điện năng của đèn.", "D. Thời gian sử dụng tối đa của bóng đèn."],
					correct: "C. Công suất định mức, cho biết mức độ tiêu thụ điện năng của đèn.",
				},
			];

			let currentQuestionIndex = 0;
			let correctCount = 0;
			let incorrectCount = 0;
			let selectedOption = null;
			let timerInterval = null;
			let secondsElapsed = 0;
			let shuffledQuestions = [];

			const resultModal = new bootstrap.Modal(document.getElementById("resultModal"));

			function shuffleArray(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			function startQuiz() {
				currentQuestionIndex = 0;
				correctCount = 0;
				incorrectCount = 0;
				shuffledQuestions = shuffleArray([...questions]);
				secondsElapsed = 0;

				updateStats();
				loadQuestion();
				startTimer();
			}

			function startTimer() {
				if (timerInterval) clearInterval(timerInterval);
				secondsElapsed = 0;
				document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				timerInterval = setInterval(() => {
					secondsElapsed++;
					document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				}, 1000);
			}

			function updateStats() {
				document.querySelector("#stats .stats-correct").textContent = correctCount;
				document.querySelector("#stats .stats-incorrect").textContent = incorrectCount;
			}

			function loadQuestion() {
				if (currentQuestionIndex >= shuffledQuestions.length) {
					showResult();
					return;
				}

				const q = shuffledQuestions[currentQuestionIndex];
				const questionElement = document.getElementById("question");
				let formattedQuestion = q.question.replace(/\*([^*]+)\*/g, '<span class="text-primary fw-bold">$1</span>');
				questionElement.innerHTML = formattedQuestion;

				const playArea = document.querySelector(".play");
				let imageContainer = playArea.querySelector("#questionImageContainer");

				if (q.image) {
					if (!imageContainer) {
						imageContainer = document.createElement("div");
						imageContainer.id = "questionImageContainer";
						imageContainer.className = "text-center mb-4";
						const img = document.createElement("img");
						img.id = "questionImage";
						img.className = "img-fluid";
						img.style.maxHeight = "400px";
						img.alt = "Hình minh họa câu hỏi";
						imageContainer.appendChild(img);
						// Chèn ngay sau phần câu hỏi
						document.getElementById("question").after(imageContainer);
					}
					document.getElementById("questionImage").src = q.image;
					imageContainer.style.display = "block";
				} else {
					if (imageContainer) {
						imageContainer.style.display = "none";
					}
				}

				const optionsContainer = document.getElementById("options");
				const confirmBtn = document.getElementById("confirmBtn");
				confirmBtn.disabled = true;
				selectedOption = null;

				const shuffledOptions = shuffleArray([...q.options]);

				optionsContainer.innerHTML = "";

				shuffledOptions.forEach((option) => {
					const div = document.createElement("div");
					div.className = "option-pill";
					div.textContent = option;
					div.onclick = () => selectOption(div, option);
					optionsContainer.appendChild(div);
				});
			}

			function selectOption(element, option) {
				document.querySelectorAll(".option-pill").forEach((pill) => pill.classList.remove("selected"));
				element.classList.add("selected");
				selectedOption = option;
				document.getElementById("confirmBtn").disabled = false;
			}

			function checkAnswer() {
				const q = shuffledQuestions[currentQuestionIndex];
				const isCorrect = selectedOption === q.correct;
				const selectedPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === selectedOption);

				if (isCorrect) {
					correctCount++;
					selectedPill.classList.add("correct");
					correctSound.play().catch((e) => console.log("Không phát được âm thanh Correct:", e));
				} else {
					incorrectCount++;
					selectedPill.classList.add("incorrect");
					const correctPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === q.correct);
					if (correctPill) correctPill.classList.add("correct");
					errorSound.play().catch((e) => console.log("Không phát được âm thanh Incorrect:", e));
				}
				updateStats();

				setTimeout(() => {
					currentQuestionIndex++;
					loadQuestion();
				}, 1000);
			}

			function showResult() {
				clearInterval(timerInterval);
				document.getElementById("resultCorrect").textContent = correctCount;
				document.getElementById("resultIncorrect").textContent = incorrectCount;
				document.getElementById("resultTime").textContent = `${secondsElapsed}s`;

				if (correctCount === shuffledQuestions.length) {
					document.getElementById("resultTitle").textContent = "Excellent!";
					document.getElementById("resultMessage").textContent = "You achieved 100% accuracy.";
				} else {
					document.getElementById("resultTitle").textContent = "Finished!";
					document.getElementById("resultMessage").textContent = `You answered ${correctCount} out of ${shuffledQuestions.length} questions correctly. Give it another shot!`;
				}
				resultModal.show();
			}

			function restartQuiz() {
				resultModal.hide();
				startQuiz();
			}

			document.getElementById("confirmBtn").onclick = checkAnswer;
			document.addEventListener("keydown", (e) => {
				if (e.code === "Space" && !document.getElementById("confirmBtn").disabled) {
					e.preventDefault();
					checkAnswer();
				}
			});

			document.addEventListener("DOMContentLoaded", () => {
				startQuiz();
			});
		</script>
	</body>
</html>
