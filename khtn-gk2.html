<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ôn tập KHTN Lớp 6 - GHK2</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="style.css" rel="stylesheet" />
	</head>
	<body>
		<!-- Result Modal -->
		<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header bg-primary text-white">
						<h5 class="modal-title" id="resultTitle"></h5>
					</div>
					<div class="modal-body text-center">
						<p id="resultMessage" class="fs-4"></p>
						<div class="d-flex justify-content-center align-items-center gap-3">
							<p>Correct: <span id="resultCorrect" class="stats-correct fw-bold fs-3"></span></p>
							<p>Incorrect: <span id="resultIncorrect" class="stats-incorrect fw-bold fs-3"></span></p>
							<p>Time: <span id="resultTime" class="fw-bold fs-3"></span></p>
						</div>
						<button class="btn btn-lg btn-primary mt-3" onclick="restartQuiz()">Retest</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Main Content -->
		<div class="w-100">
			<div class="header d-flex justify-content-between align-items-center bg-dark text-white w-100">
				<a href="index.html" class="text-decoration-none text-white me-5"><span class="material-symbols-outlined">arrow_back</span></a>
				<div class="d-flex flex-column gap-2">
					<h1 class="text-center m-0 d-none d-sm-block">Ôn tập Khoa Học Tự nhiên Lớp 6 - GHK2</h1>
					<div id="timer" class="fs-5 text-center text-warning">Time: 0s</div>
				</div>
				<div id="stats" class="text-end">
					<div>Correct: <span class="stats-correct">0</span></div>
					<div>Incorrect: <span class="stats-incorrect">0</span></div>
				</div>
			</div>
			<div class="play mx-auto">
				<div id="question" class="question-display"></div>
				<div id="options" class="d-flex flex-column flex-wrap justify-content-center"></div>
				<div class="text-center">
					<button id="confirmBtn" class="btn btn-success confirm-btn" disabled>Confirm (Phím Space)</button>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script>
			const correctSound = new Audio("correct.mp3");
			const errorSound = new Audio("error.mp3");

			const questions = [
				{
					question: "Loại cây nào dưới đây được dùng để làm thực phẩm?",

					correct: "Cây rau muống.",

				{
					question: "San hô thuộc Giới nào dưới đây?",

					correct: "Giới Động vật.",
				},
				{
					question: "Cơ quan sinh sản của ngành Hạt trần được gọi là gì?",
					options: ["Bào tử.", "Nón.", "Hoa.", "Rễ."],
					correct: "Nón.",
				},
				{
					question: "Quan sát hình và xác định cấu tạo của virus.",
					image: "imgs/khtn-cau4.jpg",
					options: ["(1) Vỏ ngoài, (2) Vỏ protein, (3) Phần lõi.", "(1) Vỏ protein, (2) Vỏ ngoài, (3) Phần lõi.", "(1) Phần lõi, (2) Vỏ protein, (3) Vỏ ngoài.", "(1) Vỏ ngoài, (2) Phần lõi, (3) Vỏ protein."],
					correct: "(1) Phần lõi, (2) Vỏ protein, (3) Vỏ ngoài.",
				},
				{
					question: "Hiện nay trên Trái Đất có khoảng bao nhiêu loài động vật đã được mô tả và đặt tên?",
					options: ["1,5 triệu loài.", "7,7 triệu loài.", "5,6 triệu loài.", "2,16 triệu loài."],
					correct: "2,16 triệu loài.",
				},
				{
					question: "Động vật có xương sống bao gồm:",
					options: ["Cá, Chân khớp, Bò sát, Chim, Thú.", "Cá, Lưỡng cư, Bò sát, Chim, Thú.", "Cá, Lưỡng cư, Bò sát, Ruột khoang, Thú.", "Thân mềm, Lưỡng cư, Bò sát, Chim, Thú."],
					correct: "Cá, Lưỡng cư, Bò sát, Chim, Thú.",
				},
				{
					question: "Động vật không xương sống bao gồm:",
					options: ["Cá, Ruột khoang, Giun, Chân khớp.", "Cá, Ruột khoang, Giun, Thân mềm.", "Ruột khoang, Bò sát, Thân mềm, Chân khớp.", "Ruột khoang, Giun, Thân mềm, Chân khớp."],
					correct: "Ruột khoang, Giun, Thân mềm, Chân khớp.",
				},
				{
					question: "Loài động vật nào dưới đây thuộc Ngành Thân mềm?",
					options: ["Mực.", "Châu chấu.", "Thủy tức.", "Giun."],
					correct: "Mực.",
				},
				{
					question: "Ghép nội dung ở cột A với cột B.",
					image: "imgs/khtn-cau9.jpg",
					options: ["1-e, 2-c, 3-b, 4-a.", "1-c, 2-d, 3-a, 4-b.", "1-c, 2-d, 3-b, 4-a.", "1-d, 2-c, 3-a, 4-b."],
					correct: "1-c, 2-d, 3-b, 4-a.",
				},
				{
					question: "Loài cá nào không phải đại diện của lớp cá sụn?",
					options: ["Cá mập.", "Cá đuối.", "Cá voi.", "Cá nhám."],
					correct: "Cá voi.",
				},
				{
					question: "Sự đa dạng của động vật được thể hiện rõ nhất ở:",
					options: ["Cấu tạo cơ thể và số lượng loài.", "Hình thức dinh dưỡng và hình thức vận chuyển.", "Môi trường sống và hình thức dinh dưỡng.", "Số lượng loài và môi trường sống."],
					correct: "Cấu tạo cơ thể và số lượng loài.",
				},
				{
					question: "Tập hợp các loài nào sau đây thuộc lớp Thú?",
					options: ["Gấu, mèo, dê, cá heo.", "Bò, châu chấu, sư tử, voi.", "Tôm, muỗi, lợn, cừu.", "Cá voi, vịt trời, rùa, thỏ."],
					correct: "Gấu, mèo, dê, cá heo.",
				},
				{
					question: "Vai trò của đa dạng sinh học đối với con người:<br/>1. Cung cấp nguồn lương thực, thực phẩm<br/>2. Cung cấp nguồn nguyên vật liệu cho các hoạt động sản xuất của con người<br/>3. Tạo môi trường sống cho các loài động vật hoang dã<br/>4. Cung cấp dược liệu để làm thuốc và các loại thực phẩm chức năng",
					options: ["(1), (2), (3).", "(1), (2), (4).", "(2), (3), (4).", "(1), (3), (4)."],
					correct: "(1), (2), (4).",
				},
				{
					question: "Cây nào sau đây thuộc nhóm thực vật Hạt kín?",
					options: ["Cây đào.", "Cây dương xỉ.", "Hải quỳ.", "Cây vạn tuế."],
					correct: "Cây đào.",
				},
				{
					question: "Đặc điểm nào có ở Dương xỉ mà không có ở Rêu?",
					options: ["Sinh sản bằng bào tử.", "Thân có mạch dẫn.", "Có lá thật.", "Chưa có rễ chính thức."],
					correct: "Thân có mạch dẫn.",
				},
				{
					question: "Đại diện nào dưới đây không thuộc ngành Thực vật?",
					options: ["Rêu tường.", "Tảo lục.", "Dương xỉ.", "Rong đuôi chó."],
					correct: "Tảo lục.",
				},
				{
					question: "Cây nào dưới đây không được xếp vào nhóm thực vật có hoa?",
					options: ["Cây dương xỉ.", "Cây bèo tây.", "Cây ngô.", "Cây lúa."],
					correct: "Cây dương xỉ.",
				},
				{
					question: "Dụng cụ nào sau đây không cần dùng khi tìm hiểu sinh vật ngoài thiên nhiên?",
					options: ["Kính hiển vi.", "Ống nhòm.", "Kéo.", "Vợt bắt bướm."],
					correct: "Kính hiển vi.",
				},
				{
					question: "Dương xỉ sinh sản như thế nào?",
					options: ["Sinh sản bằng nảy chồi.", "Sinh sản bằng củ.", "Sinh sản bằng bào tử.", "Sinh sản bằng hạt."],
					correct: "Sinh sản bằng bào tử.",
				},
				{
					question: "Cá voi là đại diện của nhóm động vật nào?",
					options: ["Cá.", "Thú.", "Lưỡng cư.", "Bò sát."],
					correct: "Thú.",
				},
				{
					question: "Nhóm cây nào gồm các cây thuộc ngành Hạt kín?",
					options: ["Dương xỉ, hoa hồng, ổi, rêu.", "Nhãn, hoa li, bèo tấm, vạn tuế.", "Bưởi, táo, hồng xiêm, lúa.", "Thông, rêu, lúa, rau muống."],
					correct: "Bưởi, táo, hồng xiêm, lúa.",
				},
				{
					question: "Hoạt động nào không làm suy giảm đa dạng sinh học?",
					options: ["Xả chất thải công nghiệp.", "Phá rừng.", "Săn bắt động vật quý hiếm.", "Trồng cây rừng."],
					correct: "Trồng cây rừng.",
				},
				{
					question: "Hầu hết các bộ phận của cây nào đều chứa độc tố?",
					options: ["Rau ngót.", "Trúc đào.", "Cần tây.", "Chùm ngây."],
					correct: "Trúc đào.",
				},
				{
					question: "Muốn đo lực ta dùng dụng cụ nào?",
					options: ["Cân.", "Bình chia độ.", "Thước.", "Lực kế."],
					correct: "Lực kế.",
				},
				{
					question: "Đơn vị đo lực là:",
					options: ["Kilogam.", "Mét.", "Mililit.", "Niutơn."],
					correct: "Niutơn.",
				},
				{
					question: "Làm lò xo bị dãn ra là lực gì?",
					options: ["Lực đẩy.", "Lực hút.", "Lực kéo.", "Lực nén."],
					correct: "Lực kéo.",
				},
				{
					question: "Muốn biểu diễn lực cần biết:",
					options: ["Phương, chiều.", "Điểm đặt, phương, chiều.", "Điểm đặt, phương, độ lớn.", "Điểm đặt, phương, chiều, độ lớn."],
					correct: "Điểm đặt, phương, chiều, độ lớn.",
				},
				{
					question: "Lực của tay người bắn cung tác dụng lên dây cung có phương và chiều:",
					image: "imgs/khtn-cau28.jpg",
					options: ["Thẳng đứng từ trên xuống.", "Thẳng đứng từ dưới lên.", "Nằm ngang từ trái qua phải.", "Nằm ngang từ phải qua trái."],
					correct: "Nằm ngang từ phải qua trái.",
				},
				{
					question: "Việc nào không cần dùng tới lực?",
					options: ["Cầm bút viết.", "Chơi nhảy dây.", "Đọc một trang sách.", "Bế em bé."],
					correct: "Đọc một trang sách.",
				},
				{
					question: "Lực nào là lực không tiếp xúc?",
					options: ["Lực hút của nam châm.", "Lực của thủ môn bắt bóng.", "Lực gió tác động lên buồm.", "Lực đẩy xe đồ chơi."],
					correct: "Lực hút của nam châm.",
				},
				{
					question: "Biểu diễn lực 20N phương ngang từ phải sang trái.",
					image: "imgs/khtn-cau31.jpg",
					options: ["Hình b.", "Hình d.", "Hình c.", "Hình a."],
					correct: "Hình b.",
				},
				{
					question: "Vì sao vùng đồi có rừng ít xảy ra xói mòn?",
					options: ["Vì đất là đất sét.", "Vì lượng mưa thấp.", "Vì rễ cây giữ đất và giảm dòng chảy.", "Vì nước bị hấp thu hết."],
					correct: "Vì rễ cây giữ đất và giảm dòng chảy.",
				},
			];

			let currentQuestionIndex = 0;
			let correctCount = 0;
			let incorrectCount = 0;
			let selectedOption = null;
			let timerInterval = null;
			let secondsElapsed = 0;
			let shuffledQuestions = [];

			const resultModal = new bootstrap.Modal(document.getElementById("resultModal"));

			function shuffleArray(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			function startQuiz() {
				currentQuestionIndex = 0;
				correctCount = 0;
				incorrectCount = 0;
				shuffledQuestions = shuffleArray([...questions]);
				secondsElapsed = 0;

				updateStats();
				loadQuestion();
				startTimer();
			}

			function startTimer() {
				if (timerInterval) clearInterval(timerInterval);
				secondsElapsed = 0;
				document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				timerInterval = setInterval(() => {
					secondsElapsed++;
					document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				}, 1000);
			}

			function updateStats() {
				document.querySelector("#stats .stats-correct").textContent = correctCount;
				document.querySelector("#stats .stats-incorrect").textContent = incorrectCount;
			}

			function loadQuestion() {
				if (currentQuestionIndex >= shuffledQuestions.length) {
					showResult();
					return;
				}

				const q = shuffledQuestions[currentQuestionIndex];
				const questionElement = document.getElementById("question");
				let formattedQuestion = q.question.replace(/\*([^*]+)\*/g, '<span class="text-primary fw-bold">$1</span>');
				questionElement.innerHTML = formattedQuestion;

				const playArea = document.querySelector(".play");
				let imageContainer = playArea.querySelector("#questionImageContainer");

				if (q.image) {
					if (!imageContainer) {
						imageContainer = document.createElement("div");
						imageContainer.id = "questionImageContainer";
						imageContainer.className = "text-center mb-4";
						const img = document.createElement("img");
						img.id = "questionImage";
						img.className = "img-fluid";
						img.style.maxHeight = "400px";
						img.alt = "Hình minh họa câu hỏi";
						imageContainer.appendChild(img);
						// Chèn ngay sau phần câu hỏi
						document.getElementById("question").after(imageContainer);
					}
					document.getElementById("questionImage").src = q.image;
					imageContainer.style.display = "block";
				} else {
					if (imageContainer) {
						imageContainer.style.display = "none";
					}
				}

				const optionsContainer = document.getElementById("options");
				const confirmBtn = document.getElementById("confirmBtn");
				confirmBtn.disabled = true;
				selectedOption = null;

				const shuffledOptions = shuffleArray([...q.options]);

				optionsContainer.innerHTML = "";

				shuffledOptions.forEach((option) => {
					const div = document.createElement("div");
					div.className = "option-pill";
					div.textContent = option;
					div.onclick = () => selectOption(div, option);
					optionsContainer.appendChild(div);
				});
			}

			function selectOption(element, option) {
				document.querySelectorAll(".option-pill").forEach((pill) => pill.classList.remove("selected"));
				element.classList.add("selected");
				selectedOption = option;
				document.getElementById("confirmBtn").disabled = false;
			}

			function checkAnswer() {
				const q = shuffledQuestions[currentQuestionIndex];
				const isCorrect = selectedOption === q.correct;
				const selectedPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === selectedOption);

				if (isCorrect) {
					correctCount++;
					selectedPill.classList.add("correct");
					correctSound.play().catch((e) => console.log("Không phát được âm thanh Correct:", e));
				} else {
					incorrectCount++;
					selectedPill.classList.add("incorrect");
					const correctPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === q.correct);
					if (correctPill) correctPill.classList.add("correct");
					errorSound.play().catch((e) => console.log("Không phát được âm thanh Incorrect:", e));
				}
				updateStats();

				setTimeout(() => {
					currentQuestionIndex++;
					loadQuestion();
				}, 1000);
			}

			function showResult() {
				clearInterval(timerInterval);
				document.getElementById("resultCorrect").textContent = correctCount;
				document.getElementById("resultIncorrect").textContent = incorrectCount;
				document.getElementById("resultTime").textContent = `${secondsElapsed}s`;

				if (correctCount === shuffledQuestions.length) {
					document.getElementById("resultTitle").textContent = "Excellent!";
					document.getElementById("resultMessage").textContent = "You achieved 100% accuracy.";
				} else {
					document.getElementById("resultTitle").textContent = "Finished!";
					document.getElementById("resultMessage").textContent = `You answered ${correctCount} out of ${shuffledQuestions.length} questions correctly. Give it another shot!`;
				}
				resultModal.show();
			}

			function restartQuiz() {
				resultModal.hide();
				startQuiz();
			}

			document.getElementById("confirmBtn").onclick = checkAnswer;
			document.addEventListener("keydown", (e) => {
				if (e.code === "Space" && !document.getElementById("confirmBtn").disabled) {
					e.preventDefault();
					checkAnswer();
				}
			});

			document.addEventListener("DOMContentLoaded", () => {
				startQuiz();
			});
		</script>
	</body>
</html>
