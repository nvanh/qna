<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ôn tập KHTN Lớp 6 - GHK2</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="style.css" rel="stylesheet" />
	</head>
	<body>
		<!-- Result Modal -->
		<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header bg-primary text-white">
						<h5 class="modal-title" id="resultTitle"></h5>
					</div>
					<div class="modal-body text-center">
						<p id="resultMessage" class="fs-4"></p>
						<div class="d-flex justify-content-center align-items-center gap-3">
							<p>Correct: <span id="resultCorrect" class="stats-correct fw-bold fs-3"></span></p>
							<p>Incorrect: <span id="resultIncorrect" class="stats-incorrect fw-bold fs-3"></span></p>
							<p>Time: <span id="resultTime" class="fw-bold fs-3"></span></p>
						</div>
						<button class="btn btn-lg btn-primary mt-3" onclick="restartQuiz()">Retest</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Main Content -->
		<div class="w-100">
			<div class="header d-flex justify-content-between align-items-center bg-dark text-white w-100">
				<a href="index.html" class="text-decoration-none text-white me-5"><span class="material-symbols-outlined">arrow_back</span></a>
				<div class="d-flex flex-column gap-2">
					<h1 class="text-center m-0 d-none d-sm-block">Ôn tập Khoa Học Tự nhiên Lớp 6 - GHK2</h1>
					<div id="timer" class="fs-5 text-center text-warning">Time: 0s</div>
				</div>
				<div id="stats" class="text-end">
					<div>Correct: <span class="stats-correct">0</span></div>
					<div>Incorrect: <span class="stats-incorrect">0</span></div>
				</div>
			</div>
			<div class="play mx-auto">
				<div id="question" class="question-display"></div>
				<div id="options" class="d-flex flex-column flex-wrap justify-content-center"></div>
				<div class="text-center">
					<button id="confirmBtn" class="btn btn-success confirm-btn" disabled>Confirm (Phím Space)</button>
				</div>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script>
			const correctSound = new Audio("correct.mp3");
			const errorSound = new Audio("error.mp3");

			const questions = [
				{
					question: "Câu 1. Loại cây nào dưới đây được dùng để làm thực phẩm?",

				},
				{
					question: "Câu 2. San hô thuộc Giới nào dưới đây?",

					correct: "C. Giới Động vật.",
				},
				{
					question: "Câu 3. Cơ quan sinh sản của ngành Hạt trần được gọi là gì?",
					options: ["A. Bào tử.", "B. Nón.", "C. Hoa.", "D. Rễ."],
					correct: "B. Nón.",
				},
				{
					question: "Câu 4. Quan sát hình và xác định cấu tạo của virus.",
					options: ["A. (1) Vỏ ngoài, (2) Vỏ protein, (3) Phần lõi.", "B. (1) Vỏ protein, (2) Vỏ ngoài, (3) Phần lõi.", "C. (1) Phần lõi, (2) Vỏ protein, (3) Vỏ ngoài.", "D. (1) Vỏ ngoài, (2) Phần lõi, (3) Vỏ protein."],
					correct: "C. (1) Phần lõi, (2) Vỏ protein, (3) Vỏ ngoài.",
				},
				{
					question: "Câu 5. Hiện nay trên Trái Đất có khoảng bao nhiêu loài động vật đã được mô tả và đặt tên?",
					options: ["A. 1,5 triệu loài.", "B. 7,7 triệu loài.", "C. 5,6 triệu loài.", "D. 2,16 triệu loài."],
					correct: "D. 2,16 triệu loài.",
				},
				{
					question: "Câu 6. Động vật có xương sống bao gồm:",
					options: ["A. Cá, Chân khớp, Bò sát, Chim, Thú.", "B. Cá, Lưỡng cư, Bò sát, Chim, Thú.", "C. Cá, Lưỡng cư, Bò sát, Ruột khoang, Thú.", "D. Thân mềm, Lưỡng cư, Bò sát, Chim, Thú."],
					correct: "B. Cá, Lưỡng cư, Bò sát, Chim, Thú.",
				},
				{
					question: "Câu 7. Động vật không xương sống bao gồm:",
					options: ["A. Cá, Ruột khoang, Giun, Chân khớp.", "B. Cá, Ruột khoang, Giun, Thân mềm.", "C. Ruột khoang, Bò sát, Thân mềm, Chân khớp.", "D. Ruột khoang, Giun, Thân mềm, Chân khớp."],
					correct: "D. Ruột khoang, Giun, Thân mềm, Chân khớp.",
				},
				{
					question: "Câu 8. Loài động vật nào dưới đây thuộc Ngành Thân mềm?",
					options: ["A. Mực.", "B. Châu chấu.", "C. Thủy tức.", "D. Giun."],
					correct: "A. Mực.",
				},
				{
					question: "Câu 9. Ghép nội dung ở cột A với cột B.",
					options: ["A. 1-e, 2-c, 3-b, 4-a.", "B. 1-c, 2-d, 3-a, 4-b.", "C. 1-c, 2-d, 3-b, 4-a.", "D. 1-d, 2-c, 3-a, 4-b."],
					correct: "C. 1-c, 2-d, 3-b, 4-a.",
				},
				{
					question: "Câu 10. Loài cá nào không phải đại diện của lớp cá sụn?",
					options: ["A. Cá mập.", "B. Cá đuối.", "C. Cá voi.", "D. Cá nhám."],
					correct: "C. Cá voi.",
				},
				{
					question: "Câu 11. Sự đa dạng của động vật được thể hiện rõ nhất ở:",
					options: ["A. Cấu tạo cơ thể và số lượng loài.", "B. Hình thức dinh dưỡng và hình thức vận chuyển.", "C. Môi trường sống và hình thức dinh dưỡng.", "D. Số lượng loài và môi trường sống."],
					correct: "A. Cấu tạo cơ thể và số lượng loài.",
				},
				{
					question: "Câu 12. Tập hợp các loài nào sau đây thuộc lớp Thú?",
					options: ["A. Gấu, mèo, dê, cá heo.", "B. Bò, châu chấu, sư tử, voi.", "C. Tôm, muỗi, lợn, cừu.", "D. Cá voi, vịt trời, rùa, thỏ."],
					correct: "A. Gấu, mèo, dê, cá heo.",
				},
				{
					question: "Câu 13. Vai trò của đa dạng sinh học đối với con người:",
					options: ["A. (1), (2), (3).", "B. (1), (2), (4).", "C. (2), (3), (4).", "D. (1), (3), (4)."],
					correct: "B. (1), (2), (4).",
				},
				{
					question: "Câu 14. Cây nào sau đây thuộc nhóm thực vật Hạt kín?",
					options: ["A. Cây đào.", "B. Cây dương xỉ.", "C. Hải quỳ.", "D. Cây vạn tuế."],
					correct: "A. Cây đào.",
				},
				{
					question: "Câu 15. Đặc điểm nào có ở Dương xỉ mà không có ở Rêu?",
					options: ["A. Sinh sản bằng bào tử.", "B. Thân có mạch dẫn.", "C. Có lá thật.", "D. Chưa có rễ chính thức."],
					correct: "B. Thân có mạch dẫn.",
				},
				{
					question: "Câu 16. Đại diện nào dưới đây không thuộc ngành Thực vật?",
					options: ["A. Rêu tường.", "B. Tảo lục.", "C. Dương xỉ.", "D. Rong đuôi chó."],
					correct: "D. Rong đuôi chó.",
				},
				{
					question: "Câu 17. Cây nào dưới đây không được xếp vào nhóm thực vật có hoa?",
					options: ["A. Cây dương xỉ.", "B. Cây bèo tây.", "C. Cây ngô.", "D. Cây lúa."],
					correct: "A. Cây dương xỉ.",
				},
				{
					question: "Câu 18. Dụng cụ nào sau đây không cần dùng khi tìm hiểu sinh vật ngoài thiên nhiên?",
					options: ["A. Kính hiển vi.", "B. Ống nhòm.", "C. Kéo.", "D. Vợt bắt bướm."],
					correct: "A. Kính hiển vi.",
				},
				{
					question: "Câu 19. Dương xỉ sinh sản như thế nào?",
					options: ["A. Sinh sản bằng nảy chồi.", "B. Sinh sản bằng củ.", "C. Sinh sản bằng bào tử.", "D. Sinh sản bằng hạt."],
					correct: "C. Sinh sản bằng bào tử.",
				},
				{
					question: "Câu 20. Cá voi là đại diện của nhóm động vật nào?",
					options: ["A. Cá.", "B. Thú.", "C. Lưỡng cư.", "D. Bò sát."],
					correct: "B. Thú.",
				},
				{
					question: "Câu 21. Nhóm cây nào gồm các cây thuộc ngành Hạt kín?",
					options: ["A. Dương xỉ, hoa hồng, ổi, rêu.", "B. Nhãn, hoa li, bèo tấm, vạn tuế.", "C. Bưởi, táo, hồng xiêm, lúa.", "D. Thông, rêu, lúa, rau muống."],
					correct: "C. Bưởi, táo, hồng xiêm, lúa.",
				},
				{
					question: "Câu 22. Hoạt động nào không làm suy giảm đa dạng sinh học?",
					options: ["A. Xả chất thải công nghiệp.", "B. Phá rừng.", "C. Săn bắt động vật quý hiếm.", "D. Trồng cây rừng."],
					correct: "D. Trồng cây rừng.",
				},
				{
					question: "Câu 23. Hầu hết các bộ phận của cây nào đều chứa độc tố?",
					options: ["A. Rau ngót.", "B. Trúc đào.", "C. Cần tây.", "D. Chùm ngây."],
					correct: "B. Trúc đào.",
				},
				{
					question: "Câu 24. Muốn đo lực ta dùng dụng cụ nào?",
					options: ["A. Cân.", "B. Bình chia độ.", "C. Thước.", "D. Lực kế."],
					correct: "D. Lực kế.",
				},
				{
					question: "Câu 25. Đơn vị đo lực là:",
					options: ["A. Kilogam.", "B. Mét.", "C. Mililit.", "D. Niutơn."],
					correct: "D. Niutơn.",
				},
				{
					question: "Câu 26. Làm lò xo bị dãn ra là lực gì?",
					options: ["A. Lực đẩy.", "B. Lực hút.", "C. Lực kéo.", "D. Lực nén."],
					correct: "C. Lực kéo.",
				},
				{
					question: "Câu 27. Muốn biểu diễn lực cần biết:",
					options: ["A. Phương, chiều.", "B. Điểm đặt, phương, chiều.", "C. Điểm đặt, phương, độ lớn.", "D. Điểm đặt, phương, chiều, độ lớn."],
					correct: "D. Điểm đặt, phương, chiều, độ lớn.",
				},
				{
					question: "Câu 28. Lực của tay người bắn cung tác dụng lên dây cung có phương và chiều:",
					options: ["A. Thẳng đứng từ trên xuống.", "B. Thẳng đứng từ dưới lên.", "C. Nằm ngang từ trái qua phải.", "D. Nằm ngang từ phải qua trái."],
					correct: "C. Nằm ngang từ trái qua phải.",
				},
				{
					question: "Câu 29. Việc nào không cần dùng tới lực?",
					options: ["A. Cầm bút viết.", "B. Chơi nhảy dây.", "C. Đọc một trang sách.", "D. Bế em bé."],
					correct: "C. Đọc một trang sách.",
				},
				{
					question: "Câu 30. Lực nào là lực không tiếp xúc?",
					options: ["A. Lực hút của nam châm.", "B. Lực của thủ môn bắt bóng.", "C. Lực gió tác động lên buồm.", "D. Lực đẩy xe đồ chơi."],
					correct: "A. Lực hút của nam châm.",
				},
				{
					question: "Câu 31. Biểu diễn lực 20N phương ngang từ phải sang trái.",
					options: ["A. Hình b.", "B. Hình d.", "C. Hình c.", "D. Hình a."],
					correct: "A. Hình b.",
				},
				{
					question: "Câu 32. Vì sao vùng đồi có rừng ít xảy ra xói mòn?",
					options: ["A. Vì đất là đất sét.", "B. Vì lượng mưa thấp.", "C. Vì rễ cây giữ đất và giảm dòng chảy.", "D. Vì nước bị hấp thu hết."],
					correct: "C. Vì rễ cây giữ đất và giảm dòng chảy.",
				},
			];

			let currentQuestionIndex = 0;
			let correctCount = 0;
			let incorrectCount = 0;
			let selectedOption = null;
			let timerInterval = null;
			let secondsElapsed = 0;
			let shuffledQuestions = [];

			const resultModal = new bootstrap.Modal(document.getElementById("resultModal"));

			function shuffleArray(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			function startQuiz() {
				currentQuestionIndex = 0;
				correctCount = 0;
				incorrectCount = 0;
				shuffledQuestions = shuffleArray([...questions]);
				secondsElapsed = 0;

				updateStats();
				loadQuestion();
				startTimer();
			}

			function startTimer() {
				if (timerInterval) clearInterval(timerInterval);
				secondsElapsed = 0;
				document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				timerInterval = setInterval(() => {
					secondsElapsed++;
					document.getElementById("timer").textContent = `Time: ${secondsElapsed}s`;
				}, 1000);
			}

			function updateStats() {
				document.querySelector("#stats .stats-correct").textContent = correctCount;
				document.querySelector("#stats .stats-incorrect").textContent = incorrectCount;
			}

			function loadQuestion() {
				if (currentQuestionIndex >= shuffledQuestions.length) {
					showResult();
					return;
				}

				const q = shuffledQuestions[currentQuestionIndex];
				const questionElement = document.getElementById("question");
				let formattedQuestion = q.question.replace(/\*([^*]+)\*/g, '<span class="text-primary fw-bold">$1</span>');
				questionElement.innerHTML = formattedQuestion;

				const playArea = document.querySelector(".play");
				let imageContainer = playArea.querySelector("#questionImageContainer");

				if (q.image) {
					if (!imageContainer) {
						imageContainer = document.createElement("div");
						imageContainer.id = "questionImageContainer";
						imageContainer.className = "text-center mb-4";
						const img = document.createElement("img");
						img.id = "questionImage";
						img.className = "img-fluid";
						img.style.maxHeight = "400px";
						img.alt = "Hình minh họa câu hỏi";
						imageContainer.appendChild(img);
						// Chèn ngay sau phần câu hỏi
						document.getElementById("question").after(imageContainer);
					}
					document.getElementById("questionImage").src = q.image;
					imageContainer.style.display = "block";
				} else {
					if (imageContainer) {
						imageContainer.style.display = "none";
					}
				}

				const optionsContainer = document.getElementById("options");
				const confirmBtn = document.getElementById("confirmBtn");
				confirmBtn.disabled = true;
				selectedOption = null;

				const shuffledOptions = shuffleArray([...q.options]);

				optionsContainer.innerHTML = "";

				shuffledOptions.forEach((option) => {
					const div = document.createElement("div");
					div.className = "option-pill";
					div.textContent = option;
					div.onclick = () => selectOption(div, option);
					optionsContainer.appendChild(div);
				});
			}

			function selectOption(element, option) {
				document.querySelectorAll(".option-pill").forEach((pill) => pill.classList.remove("selected"));
				element.classList.add("selected");
				selectedOption = option;
				document.getElementById("confirmBtn").disabled = false;
			}

			function checkAnswer() {
				const q = shuffledQuestions[currentQuestionIndex];
				const isCorrect = selectedOption === q.correct;
				const selectedPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === selectedOption);

				if (isCorrect) {
					correctCount++;
					selectedPill.classList.add("correct");
					correctSound.play().catch((e) => console.log("Không phát được âm thanh Correct:", e));
				} else {
					incorrectCount++;
					selectedPill.classList.add("incorrect");
					const correctPill = Array.from(document.querySelectorAll(".option-pill")).find((pill) => pill.textContent === q.correct);
					if (correctPill) correctPill.classList.add("correct");
					errorSound.play().catch((e) => console.log("Không phát được âm thanh Incorrect:", e));
				}
				updateStats();

				setTimeout(() => {
					currentQuestionIndex++;
					loadQuestion();
				}, 1000);
			}

			function showResult() {
				clearInterval(timerInterval);
				document.getElementById("resultCorrect").textContent = correctCount;
				document.getElementById("resultIncorrect").textContent = incorrectCount;
				document.getElementById("resultTime").textContent = `${secondsElapsed}s`;

				if (correctCount === shuffledQuestions.length) {
					document.getElementById("resultTitle").textContent = "Excellent!";
					document.getElementById("resultMessage").textContent = "You achieved 100% accuracy.";
				} else {
					document.getElementById("resultTitle").textContent = "Finished!";
					document.getElementById("resultMessage").textContent = `You answered ${correctCount} out of ${shuffledQuestions.length} questions correctly. Give it another shot!`;
				}
				resultModal.show();
			}

			function restartQuiz() {
				resultModal.hide();
				startQuiz();
			}

			document.getElementById("confirmBtn").onclick = checkAnswer;
			document.addEventListener("keydown", (e) => {
				if (e.code === "Space" && !document.getElementById("confirmBtn").disabled) {
					e.preventDefault();
					checkAnswer();
				}
			});

			document.addEventListener("DOMContentLoaded", () => {
				startQuiz();
			});
		</script>
	</body>
</html>
